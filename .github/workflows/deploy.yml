name: Deploy Pothole App

on:
  push:
    branches:
      - master

concurrency:
  group: pothole-app-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          case "$VPS_HOST" in
            http://*|https://*|*/*|*:*)
              echo "VPS_HOST must be a raw hostname or IP address only, for example 103.152.242.177. Do not include http://, https://, paths, or ports."
              exit 1
              ;;
          esac
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$APP_DIR"
          VPS_PORT="${VPS_PORT:-22}"
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"

          git fetch origin master
          git reset --hard origin/master

          docker compose up -d --build
          docker image prune -f
          docker compose ps
          REMOTE
